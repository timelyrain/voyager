<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <rect width="24" height="24" rx="5" fill="#0f172a"/>
  <circle cx="12" cy="12" r="10.5" fill="#000000" fill-opacity="0.3" stroke="#ffffff" stroke-opacity="0.35" stroke-width="0.75"/>

  <!-- N marker triangle (original, kept) -->
  <path d="M12 3.5 L13.3 6.2 L10.7 6.2 Z" fill="white"/>

  <!-- Major ticks at E (90°), S (180°), W (270°) -->
  <line x1="22.5" y1="12"   x2="20.8" y2="12"   stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="12"   y1="22.5" x2="12"   y2="20.8"  stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="1.5"  y1="12"   x2="3.2"  y2="12"   stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.75"/>

  <!-- Intercardinal ticks at NE (45°), SE (135°), SW (225°), NW (315°) -->
  <line x1="19.42" y1="4.58"  x2="18.51" y2="5.49"  stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.55"/>
  <line x1="19.42" y1="19.42" x2="18.51" y2="18.51" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.55"/>
  <line x1="4.58"  y1="19.42" x2="5.49"  y2="18.51" stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.55"/>
  <line x1="4.58"  y1="4.58"  x2="5.49"  y2="5.49"  stroke="white" stroke-width="0.65" stroke-linecap="round" opacity="0.55"/>

  <!-- Minor ticks at 30° intervals (N=0° skipped) -->
  <line x1="17.25" y1="2.91"  x2="16.75" y2="3.77"  stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="21.09" y1="6.75"  x2="20.23" y2="7.25"  stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="21.09" y1="17.25" x2="20.23" y2="16.75" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="17.25" y1="21.09" x2="16.75" y2="20.23" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="6.75"  y1="21.09" x2="7.25"  y2="20.23" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="2.91"  y1="17.25" x2="3.77"  y2="16.75" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="2.91"  y1="6.75"  x2="3.77"  y2="7.25"  stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="6.75"  y1="2.91"  x2="7.25"  y2="3.77"  stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Red direction indicator (pointing East) -->
  <g transform="rotate(90, 12, 12)">
    <path d="M12 4.8 L11 6.5 L13 6.5 Z" fill="#ef4444"/>
  </g>

  <!-- Center pivot -->
  <circle cx="12" cy="12" r="1.5" fill="white"/>
  <circle cx="12" cy="12" r="0.6" fill="#000000" fill-opacity="0.7"/>
</svg>
