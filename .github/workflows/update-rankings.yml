name: Update country rankings

on:
  schedule:
    - cron: '0 6 1 1 *'  # 6am UTC on Jan 1st each year
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update rankings
        run: node scripts/update-rankings.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/countries.ts
          if git diff --staged --quiet; then
            echo "No ranking changes to commit."
          else
            git commit -m "chore: update country tourism rankings $(date +%Y)"
            git push
          fi
